# LiteLLM gateway config — fronts the native llama-swap router (127.0.0.1:9090).
# LiteLLM runs with network_mode: host, so 127.0.0.1 = the host, where llama-swap
# listens. llama-swap is default-allow on localhost; api_key here is a placeholder.
#
# Exposed model names match llama-swap's IDs so clients see coding/chat/big.

model_list:
  - model_name: coding
    litellm_params:
      model: openai/coding
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: chat
    litellm_params:
      model: openai/chat
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: big
    litellm_params:
      model: openai/big
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: coder-next
    litellm_params:
      model: openai/coder-next
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: fast
    litellm_params:
      model: openai/fast
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: gemma-31b
    litellm_params:
      model: openai/gemma-31b
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: gemma-26b
    litellm_params:
      model: openai/gemma-26b
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: chat-uncensored-q4
    litellm_params:
      model: openai/chat-uncensored-q4
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: chat-uncensored-q6
    litellm_params:
      model: openai/chat-uncensored-q6
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"
  - model_name: fast-uncensored
    litellm_params:
      model: openai/fast-uncensored
      api_base: http://127.0.0.1:9090/v1
      api_key: "sk-llama-swap-local"

litellm_settings:
  # llama-server may not accept every OpenAI param; drop unknowns instead of erroring.
  drop_params: true
  # Model loads can take ~30-70s (cold + BF16). Don't time out early.
  request_timeout: 600
  # Pre-call hook: give content-less assistant messages an empty content so
  # llama-server doesn't 400 the whole session on one poisoned transcript turn.
  # (see custom_hooks.py)
  callbacks: custom_hooks.proxy_handler_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
