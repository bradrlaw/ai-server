# Containerized app tier for /srv/ai (hybrid model, ADR-0006).
# Native GPU engines (llama-swap/llama-server) stay on the host; this stack holds
# the CPU app tier. Start: `cd /srv/ai/docker && docker compose up -d`.

services:
  # LiteLLM — OpenAI/Anthropic-compatible gateway in front of the native
  # llama-swap router. Uses host networking to reach llama-swap on 127.0.0.1:9090
  # and to expose the gateway on the host at :4000.
  litellm:
    image: ghcr.io/berriai/litellm:v1.90.0
    container_name: litellm
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./.env
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/custom_hooks.py:/app/custom_hooks.py:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Open WebUI — family-facing chat UI + multi-user accounts. Points at the
  # LiteLLM gateway (host :4000, reached via host.docker.internal). Web search
  # via the SearXNG service; MCP tools via the mcpo service.
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - searxng
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Backend = LiteLLM gateway (OpenAI-compatible).
      OPENAI_API_BASE_URL: "http://host.docker.internal:4000/v1"
      OPENAI_API_KEY: "${LITELLM_MASTER_KEY}"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY}"
      # Web search via self-hosted SearXNG.
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ai

  # SearXNG — private metasearch backend for Open WebUI web search. No API key;
  # aggregates Google/Bing/Brave/DDG/etc. Internal-only + a localhost debug port.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      SEARXNG_SECRET: "${SEARXNG_SECRET}"
      SEARXNG_BASE_URL: "http://localhost:8888/"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - ai

  # mcpo — MCP-to-OpenAPI proxy. Exposes each MCP server in mcpo/config.json as
  # an authenticated OpenAPI endpoint (http://mcpo:8000/<tool>) for Open WebUI.
  # config.json is the versioned MCP inventory; --hot-reload picks up edits.
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo
    restart: unless-stopped
    ports:
      - "8000:8000"
    # LITELLM_MASTER_KEY (+ others) from .env enter mcpo's env and are inherited
    # by the stdio MCP subprocesses it spawns (mcpo passes {**os.environ, **cfg.env}),
    # so the plan-build server reads the key from os.environ — no secret in the
    # git-tracked config.json.
    env_file:
      - ./.env
    # host.docker.internal -> host gateway, so the plan-build server can reach the
    # LiteLLM gateway (network_mode: host, bound on the host at :4000).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--api-key"
      - "${MCPO_API_KEY}"
      - "--hot-reload"
      - "--config"
      - "/config/config.json"
    volumes:
      - ./mcpo:/config:ro
      # Read-only mount of the ai-server repo so the `git` MCP server can
      # inspect it (log/diff/status/show). RO by design: LLM-driven agents
      # cannot commit/mutate the real repo. Add more repos as extra :ro mounts.
      - /srv/ai:/repos/ai-server:ro
    networks:
      - ai

  # Filebrowser — web file manager for the ComfyUI media dirs (browse/preview/
  # download images & videos, upload, rename/delete). Serves the two instances'
  # output+input folders mounted under /data. Has its own login (first-run creds
  # admin/admin — CHANGE IT immediately in Settings → User Management). DB/config
  # live in the named volume so no runtime state lands in the git-tracked docker/.
  filebrowser:
    image: filebrowser/filebrowser:v2.32.0
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      FB_ROOT: "/data"
      FB_DATABASE: "/database/filebrowser.db"
      FB_ADDRESS: "0.0.0.0"
      FB_PORT: "80"
      FB_LOG: "stdout"
    volumes:
      # Read-write access to both instances' outputs + inputs (per user choice).
      - /srv/ai/comfyui/output-open:/data/output-open
      - /srv/ai/comfyui/input-open:/data/input-open
      - /srv/ai/comfyui/output-secure:/data/output-secure
      - /srv/ai/comfyui/input-secure:/data/input-secure
      # Read-write access to the ComfyUI models tree for manual model uploads
      # (checkpoints/, loras/, vae/, diffusion_models/, text_encoders/, etc.).
      - /srv/ai/comfyui/models:/data/models
      - filebrowser-data:/database
    networks:
      - ai

  # OpenClaw — self-hosted multi-channel personal-assistant gateway (Node daemon).
  # Talks to the native models through the LiteLLM gateway (host :4000) via its
  # dedicated `litellm` provider (config in the state dir). Control UI + API on
  # :18789. Runs as the image's `node` user (uid 1000) — the host data dirs under
  # /srv/ai/openclaw (gitignored) are 1000-owned by `scripts/assistants-seed.sh`.
  # Seed configs + dirs once: `scripts/assistants-seed.sh` before first `up`.
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.7.1
    container_name: openclaw
    restart: unless-stopped
    init: true
    depends_on:
      - litellm
    ports:
      - "18789:18789"   # Control UI + API + WebChat
      - "18790:18790"   # bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      # Must be "lan" (0.0.0.0) or published ports are unreachable; token-gated.
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN}"
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_SKIP_ONBOARDING: "1"
      # LiteLLM key (reused master key); referenced as ${LITELLM_API_KEY} in config.
      LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"
      TZ: America/New_York
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
    volumes:
      - /srv/ai/openclaw/state:/home/node/.openclaw
      - /srv/ai/openclaw/workspace:/home/node/.openclaw/workspace
      - /srv/ai/openclaw/auth-secrets:/home/node/.config/openclaw
    networks:
      - ai
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Hermes (Nous Research) — self-hosted agentic assistant. TUI-first, but runs
  # here as a headless gateway (`gateway run`) with the web dashboard (:9119) and
  # OpenAI-compatible API server (:8642) enabled. Talks to LiteLLM (host :4000)
  # via its `custom` provider (config in /opt/data). The self-improving skill loop
  # executes code INSIDE this container — isolation is the reason we containerize.
  # Do NOT set `user:` — Hermes remaps its internal user via HERMES_UID/HERMES_GID.
  # All state persists under /srv/ai/hermes (gitignored) == /opt/data.
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "9119:9119"   # web dashboard (basic-auth protected)
      - "8642:8642"   # OpenAI-compatible API server (key-gated)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Remap the internal hermes user to the host owner (brad, uid/gid 1000).
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "${HERMES_DASHBOARD_USER:-admin}"
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "${HERMES_DASHBOARD_PASSWORD}"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: "${HERMES_API_SERVER_KEY}"
      TZ: America/New_York
    command: ["gateway", "run"]
    volumes:
      - /srv/ai/hermes:/opt/data
    networks:
      - ai

networks:
  ai:
    name: ai

volumes:
  open-webui-data:
    name: open-webui-data
  filebrowser-data:
    name: filebrowser-data
