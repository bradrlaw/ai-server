# llama-swap configuration — /srv/ai (Phase 2, Core serving)
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json
#
# Native model router in front of llama.cpp's llama-server. Provides an
# OpenAI-compatible endpoint that LiteLLM (container) fronts for Copilot CLI /
# VS Code / Open WebUI / OpenClaw.
#
# GPU map (CUDA_DEVICE_ORDER=PCI_BUS_ID):
#   idx0 = Tesla P100-16GB  (aux tier — not used here)
#   idx1 = Tesla V100-32GB  -> "coding"  (Qwen3.6-27B Q6_K)
#   idx2 = Tesla V100-32GB  -> "chat"    (Qwen3.6-35B-A3B UD-Q6_K)
#   idx1+idx2 (both)        -> "big"     (Qwen3.6-27B BF16, TP=2, preempts the above)
#
# Routing engine = matrix: `coding` and `chat` run CONCURRENTLY (one per card);
# requesting `big` evicts both, and `big` auto-unloads after idle so the two
# single-card drivers can reload.

healthCheckTimeout: 900     # BF16 50GB load can be slow; give it room
logLevel: info
startPort: 10001
sendLoadingState: true      # surface "loading..." in the reasoning field for chat UIs

macros:
  "llama-server": "/srv/ai/src/llama.cpp/build/bin/llama-server"
  "models_dir": "/srv/ai/models"
  # Common server args shared by all models. Host/port are per-model via ${PORT}.
  "common": >
    --host 127.0.0.1 --port ${PORT}
    --n-gpu-layers 999
    --flash-attn on
    --cont-batching
    --jinja
    --metrics

models:
  # --- coding: Qwen3.6-27B Q6_K on V100 #1 (idx1) -------------------------
  # KV is q8_0 (near-lossless 8-bit): halves KV vs f16, which both fixes a CUDA
  # OOM on large prompts (f16 KV @160k left <1GB free, so the ub1024 prefill
  # compute buffer couldn't allocate and the server crashed) AND frees enough
  # room to raise context 160k -> 200k. At 200k q8_0 the card sits ~29.8/32GB
  # (~3GB headroom); a 11k-token prompt prefills at ~790 t/s with no OOM.
  "coding":
    name: "Qwen3.6-27B (Q6_K) — coding"
    description: "Daily-driver coding model, single V100. 200k ctx, q8_0 KV."
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=1"
    cmd: |
      ${llama-server}
      --model ${models_dir}/qwen3.6-27b/Qwen3.6-27B-Q6_K.gguf
      --ctx-size 204800
      --cache-type-k q8_0 --cache-type-v q8_0
      --parallel 1
      --batch-size 2048 --ubatch-size 1024
      ${common}

  # --- chat: Qwen3.6-35B-A3B UD-Q6_K + MTP on V100 #2 (idx2) -------------
  # MTP build (unsloth/Qwen3.6-35B-A3B-MTP-GGUF) — same UD-Q6_K weights plus the
  # model's built-in multi-token-prediction head (embedded blk.40.nextn.*, +0.7GB),
  # enabled with --spec-type draft-mtp. Lossless self-speculative decode: measured
  # +25-31% decode (88.9 -> ~117 t/s @4k, n_max=2 sweet spot) at identical weights,
  # ~2% prefill cost — see docs/benchmarking.md "MTP speculative decode" (2026-07-23).
  # VRAM: MTP head + draft path cost ~0.7GB, so ctx is capped at 96k (98304) — a
  # near-full 90k prefill peaks 31.86GB/32GB (~0.9GB headroom, measured). 128k would
  # OOM with MTP; this trades 32k of context for the decode speedup. chat runs alone
  # on idx2 (comfyui-secure evicts it before image gen via the free_gpu hook), so the
  # full-card peak is the real ceiling. 40 layers, 2 KV heads -> KV stays cheap.
  "chat":
    name: "Qwen3.6-35B-A3B (UD-Q6_K + MTP) — chat"
    description: "General/family chat MoE, single V100, MTP self-speculative decode."
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=2"
    cmd: |
      ${llama-server}
      --model ${models_dir}/qwen3.6-35b-a3b-mtp/Qwen3.6-35B-A3B-UD-Q6_K.gguf
      --ctx-size 98304
      --cache-type-k q8_0
      --cache-type-v q8_0
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      --spec-type draft-mtp --spec-draft-n-max 2
      ${common}

  # --- big: Qwen3.6-27B UD-Q6_K_XL across BOTH V100s (idx1+idx2) ----------
  # Highest-quality dense model, tuned for OVERNIGHT long-context planning where
  # accuracy/precision matter more than speed. Occasional use; auto-unloads
  # after 5 min idle so coding+chat can reclaim the cards.
  # WEIGHTS: UD-Q6_K_XL (Unsloth Dynamic, imatrix-calibrated ~24GB) at FULL f16
  # KV — chosen over BF16/Q8 after a 256k head-to-head (Tarjan SCC @ temp 0):
  # UD-Q6_K_XL+f16 gave the most VRAM headroom, the fastest decode, full KV
  # precision (best long-context recall), and 5/5 correct code. Q8 weights added
  # no correctness (also 5/5) but cost ~6GB headroom; BF16+q8_0 KV was razor-thin
  # at 256k (idx2 <1GB free).
  # NB: keeps default --ubatch-size 512 on purpose — benchmarks showed larger
  # ubatch HURTS prefill here (232->167 t/s at ub 512->2048) due to inter-GPU
  # sync overhead of the layer split. Do not add --ubatch-size.
  # Verified 2026-07-03: ctx 262144 (256k NATIVE, no RoPE scaling) with f16 KV and
  # a 104k-token prefill peaks at ~21.9GB(idx1)/24.2GB(idx2) -> ~8.3GB headroom per
  # card; decode ~22.6 t/s (layer-split limits GPU util ~47%). Deep 256k fills are
  # slow (~8+ min) — acceptable for unattended overnight passes.
  "big":
    name: "Qwen3.6-27B (UD-Q6_K_XL) — max quality, dual-V100, 256k"
    description: "Imatrix Q6 dynamic 27B split across both V100s, full f16 KV @ 256k. Preempts coding+chat."
    ttl: 300
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=1,2"
    cmd: |
      ${llama-server}
      --model ${models_dir}/qwen3.6-27b/Qwen3.6-27B-UD-Q6_K_XL.gguf
      --ctx-size 262144
      --cache-type-k f16
      --cache-type-v f16
      --split-mode layer
      --parallel 1
      ${common}

  # --- coder-next: Qwen3-Coder-Next 80B-A3B (UD-Q4_K_XL) dual-V100 --------
  # Agentic coding model: 80B total / 3B ACTIVE MoE with a hybrid Gated-DeltaNet
  # (linear attention) + Gated-Attention layout. Only 12 of 48 layers carry a
  # real KV cache, so 256k KV is cheap (~6GB f16) — full native 256k fits with
  # room to spare. NON-THINKING (no reasoning phase → direct code, no wasted
  # tokens). 256k native ctx, tuned for CLI/IDE coding agents + tool use.
  # Requires llama.cpp b9850+ (native qwen3next / delta-net support).
  # Weights split across BOTH V100s (idx1+idx2); preempts coding+chat like big.
  # WEIGHTS: UD-Q4_K_XL (Unsloth dynamic imatrix, 49.6GB) — beat plain Q5_K_M in
  # testing (Q5 was correct-but-buggy on Tarjan and can't hold 256k). Despite the
  # dual-card split, decode is ~77 t/s (only 3B active) vs ~22 t/s for dense big.
  # Verified 2026-07-04: ctx 262144 (256k native) + f16 KV peaks at 29.5GB(idx1)/
  # 27.4GB(idx2) -> ~3.0GB / ~5.0GB free per card; VRAM stays flat under a deep
  # prefill (flash-attn preallocates). Coding bench: Tarjan 5/5, LRU 4/4.
  # --parallel 2: split the 256k ctx into TWO 131k slots so an agentic client and
  # its subagent (e.g. Copilot CLI /fleet or a delegated task over BYOK) each get a
  # dedicated KV slot instead of sharing one and evicting each other's prefix every
  # turn (which forced a full ~30k-token re-prefill per step -> multi-minute stalls).
  # DeltaNet linear attention keeps KV/compute buffers flat, so 2 concurrent
  # sequences cost the SAME VRAM as 1. Verified 2026-07-17: two concurrent 26k-token
  # prefills peak 28.7GB(idx1)/27.3GB(idx2) — identical to idle, no OOM.
  "coder-next":
    name: "Qwen3-Coder-Next 80B-A3B (UD-Q4_K_XL) — agentic coding, 256k"
    description: "Hybrid-MoE coding model split across both V100s, 256k, non-thinking. Preempts coding+chat."
    ttl: 300
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=1,2"
    cmd: |
      ${llama-server}
      --model ${models_dir}/qwen3-coder-next/Qwen3-Coder-Next-UD-Q4_K_XL.gguf
      --ctx-size 262144
      --cache-type-k f16
      --cache-type-v f16
      --split-mode layer
      --parallel 2
      ${common}

  # --- fast: Gemma-4-26B-A4B MoE (QAT UD-Q4_K_XL) on the P100 (idx0) -------
  # SWAPPED 2026-07-22 from the dense Gemma-4-12B to this MoE (25B total / ~3.8B
  # active). On the P100 the MoE is strictly faster AND higher quality than the
  # 12B: ~2x decode (~60 vs ~29 tok/s), 1.5-2x prefill (568 vs 286 tok/s @2k),
  # 1.6-2x lower TTFT — because only ~3.8B params fire per token. Cost is VRAM:
  # ~15.3GB of 16GB resident (all experts) vs 8.5GB for the 12B, so it is VRAM-
  # bound on the P100: it can't do both large ctx AND high parallelism. Daily uses
  # ctx 32768 + ub1024 @ P=1 -> 15.2GB (~1.2GB free, safe for always-on). The
  # parallel overlays override ctx DOWN and cap at P=2 (agentic/heavy-coding: ctx
  # 24576 @ P=2 -> ~15.4GB); P=4 OOMs, and 48k+ OOMs at P=1. Need >32k single-user
  # context? Use the `fast-12b` fallback (128k, dense).
  # --reasoning-budget 0 keeps replies immediate (no thinking phase), matching the
  # old `fast` persona. Runs CONCURRENTLY with coding+chat (own card).
  "fast":
    name: "Gemma-4-26B-A4B (MoE) — fast non-reasoning chat"
    description: "Snappy general chat on the P100 (MoE, ~3.8B active); no reasoning phase. Always available."
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=0"
    cmd: |
      ${llama-server}
      --model ${models_dir}/gemma-4-26b-a4b/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --ctx-size 32768
      --parallel 1
      --batch-size 2048 --ubatch-size 1024
      --reasoning-budget 0
      ${common}

  # --- fast-12b: Gemma-4-12B dense (QAT UD-Q4_K_XL) on the P100 (idx0) -----
  # FALLBACK for the old always-on `fast`. Dense 12B, ~6.3GB weights -> ~8.5GB
  # with ctx, leaving ~7.5GB headroom on the 16GB P100. Slower than the MoE
  # (~29 tok/s decode, ~286 tok/s prefill @2k) but far more VRAM headroom: does
  # 128k single-user comfortably and leaves room to co-host a P100 offload job.
  # Shares idx0 with `fast`/`fast-uncensored` (mutually exclusive). Request it to
  # swap the MoE out; ttl unloads it so `fast` reclaims the card.
  "fast-12b":
    name: "Gemma-4-12B dense — fast fallback (headroom)"
    description: "Dense 12B fallback on the P100; more VRAM headroom (128k ctx) than the MoE `fast`. Shares idx0 (mutually exclusive)."
    ttl: 600
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=0"
    cmd: |
      ${llama-server}
      --model ${models_dir}/gemma-4-12b/gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
      --ctx-size 131072
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      --reasoning-budget 0
      ${common}

  # --- fast-uncensored: Gemma-4-12B QAT Uncensored (Balanced Q4_K_M) on P100 -
  # Abliterated/uncensored counterpart to `fast` (HauhauCS Balanced). ~7.4GB
  # weights; shares the P100 (idx0) with `fast`, so the two are MUTUALLY
  # EXCLUSIVE (10.9GB + 7.4GB > 16GB) — the matrix P100 slot is `(f | fu)`, so
  # requesting this evicts `fast` and vice-versa. Reasoning ON by default (the
  # Balanced tune reasons before answering); roleplay/creative-writing focus.
  # Vision via --mmproj; MTP speculative decoding (Unsloth draft head) for ~60%
  # faster generation with identical output. Tuned sampling per the model card.
  # ttl unloads it so `fast` reclaims the card.
  "fast-uncensored":
    name: "Gemma-4-12B Uncensored — reasoning chat + vision (MTP)"
    description: "Uncensored/abliterated Gemma-4-12B on the P100; reasoning on, vision (mmproj), MTP speculative decoding. Shares idx0 with fast (mutually exclusive)."
    ttl: 600
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=0"
    cmd: |
      ${llama-server}
      --model ${models_dir}/gemma-4-12b-uncensored/Gemma4-12B-QAT-Uncensored-HauhauCS-Balanced-Q4_K_M.gguf
      --mmproj ${models_dir}/gemma-4-12b-uncensored/mmproj-Gemma4-12B-QAT-Uncensored-HauhauCS-Balanced-BF16.gguf
      --model-draft ${models_dir}/gemma-4-12b-uncensored/mtp-gemma-4-12B-it.gguf
      --spec-type draft-mtp
      --n-gpu-layers-draft 99
      --ctx-size 131072
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      --temp 0.6 --top-k 64 --top-p 0.9 --min-p 0.05 --repeat-penalty 1.1
      ${common}

  # Comparison model vs Qwen coding/big. ~16GB weights; ctx 131072 with q8_0 KV
  # -> ~26.7GB on 32GB (SWA). f16 KV at 131k OOMs (31GB+compute buf); q8_0 halves
  # KV to reach 128k. ub2048 = best prefill (760 t/s). Evicts coding when used.
  "gemma-31b":
    name: "Gemma-4-31B — max-quality Gemma"
    description: "Dense 31B for quality comparison. Single V100; evicts coding."
    ttl: 600
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=1"
    cmd: |
      ${llama-server}
      --model ${models_dir}/gemma-4-31b/gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
      --ctx-size 131072
      --cache-type-k q8_0 --cache-type-v q8_0
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      ${common}

  # --- gemma-26b: Gemma-4-26B-A4B MoE (QAT UD-Q4_K_XL) on a V100 (idx2) --
  # 25B total / ~3.8B active -> fast like a small model, higher quality.
  # Comparison vs Qwen chat. ~14GB on 32GB. Evicts chat when used.
  "gemma-26b":
    name: "Gemma-4-26B-A4B (MoE) — fast+quality Gemma"
    description: "MoE 25B/3.8B-active for comparison. Single V100; evicts chat."
    ttl: 600
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=2"
    cmd: |
      ${llama-server}
      --model ${models_dir}/gemma-4-26b-a4b/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --ctx-size 131072
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      ${common}

  # --- chat-uncensored-q4: Qwen3.6-35B-A3B Uncensored (Q4_K_M) on V100 (idx1) -
  # Abliterated/uncensored MoE (35B total / ~3B active). ~20GB weights on a 32GB
  # card -> lots of room, so q8_0 KV gives a big context. Shares idx1 with coding /
  # gemma-31b / the Q6 build, so requesting it evicts those.
  # Verified 2026-07-03: ctx 262144 (256k = native max) loads at 24.8GB/32GB
  # (~7.8GB headroom). Also tested 524288 (512k) -> loads at 29.1GB (~3.6GB
  # headroom) but that is 2x native; without YaRN, quality degrades past 256k,
  # so we cap at the native 262144 for trustworthy full-context use.
  "chat-uncensored-q4":
    name: "Qwen3.6-35B-A3B Uncensored (Q4_K_M) — chat"
    description: "Uncensored general chat MoE (abliterated), Q4. Single V100; evicts coding."
    ttl: 600
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=1"
    cmd: |
      ${llama-server}
      --model ${models_dir}/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf
      --ctx-size 262144
      --cache-type-k q8_0
      --cache-type-v q8_0
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      ${common}

  # --- chat-uncensored-q6: Qwen3.6-35B-A3B Uncensored (Q6_K_P) on V100 (idx1) -
  # Higher-quality uncensored quant. ~29GB weights on a 32GB card -> q8_0 KV.
  # KV is cheap here (40 layers x 2 KV heads, q8_0) so context is affordable.
  # Verified 2026-07-03: ctx 131072 (128k) with a full 120k prefill peaks at
  # 31.8GB/32GB (~1.0GB headroom, no OOM). This is the RAGGED EDGE — it fits
  # because KV+compute are preallocated at load and flash-attn keeps the compute
  # buffer flat. A maxed-out ultra-long chat could OOM on a cuBLAS-workspace grab;
  # that failure is visible (client error + `journalctl -u llama-swap` shows
  # "CUDA error: out of memory"), non-corrupting, and self-recovering (llama-swap
  # relaunches the backend on the next request). Use chat-uncensored-q4 for a
  # roomy 128k. Do NOT raise Q6 ctx further.
  "chat-uncensored-q6":
    name: "Qwen3.6-35B-A3B Uncensored (Q6_K_P) — chat"
    description: "Uncensored general chat MoE (abliterated), Q6. Single V100; evicts coding."
    ttl: 600
    env:
      - "CUDA_DEVICE_ORDER=PCI_BUS_ID"
      - "CUDA_VISIBLE_DEVICES=1"
    cmd: |
      ${llama-server}
      --model ${models_dir}/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q6_K_P.gguf
      --ctx-size 131072
      --cache-type-k q8_0
      --cache-type-v q8_0
      --parallel 1
      --batch-size 2048 --ubatch-size 2048
      ${common}

routing:
  router:
    use: matrix
    settings:
      matrix:
        # Card map: idx0(P100)=fast(MoE)|fast-12b|fast-uncensored ; idx1(V100)=coding|gemma-31b|chat-uncensored-q4|chat-uncensored-q6|big ;
        #           idx2(V100)=chat|gemma-26b|big. P100 slot is `(f | fu)`: `fast`
        #           and `fast-uncensored` are mutually exclusive on idx0 (they
        #           evict each other); one of them coexists with all V100 activity.
        vars:
          c: coding
          h: chat
          b: big
          f: fast
          fu: fast-uncensored
          n: coder-next
          x: gemma-31b
          y: gemma-26b
          u: chat-uncensored-q4
          w: chat-uncensored-q6
        evict_costs:
          b: 50   # BF16 is very slow to load; prefer keeping it if already up
          n: 30   # 50GB Q4 across both V100s is slow to load; prefer keeping it
        sets:
          # Each set = models that CAN be co-resident (subset semantics allow
          # any subset, e.g. just [f], or [c] alone). The P100 slot `(f | fu)`
          # expands each set into a `fast` and a `fast-uncensored` variant, so
          # exactly one P100 model coexists with V100 activity and requesting the
          # other swaps it in.
          qq: "c & h & (f | fu)"    # daily: coding(idx1) + chat(idx2) + P100 chat
          qg: "c & y & (f | fu)"    # coding vs gemma-26b head-to-head
          gq: "x & h & (f | fu)"    # gemma-31b vs chat head-to-head
          gg: "x & y & (f | fu)"    # both Gemmas (idx1+idx2) + P100 chat
          qu: "u & h & (f | fu)"    # uncensored-Q4(idx1) + chat(idx2) + P100 chat
          qw: "w & h & (f | fu)"    # uncensored-Q6(idx1) + chat(idx2) + P100 chat
          max: "b & (f | fu)"       # big(idx1+idx2) + P100 chat
          cn: "n & (f | fu)"        # coder-next(idx1+idx2) + P100 chat

# hooks: run actions on lifecycle events. Preload `fast` on startup so the P100
# (idx0) is never left empty after a llama-swap (re)start — the P100 slot is
# `(f | fu)`, so `fast` is the always-ready default there. (This covers restarts;
# if `fast-uncensored` is requested it evicts `fast` and, once its ttl expires,
# the P100 stays empty until `fast` is requested again — request `fast` to
# restore it. Single-model preload = no group needed.)
hooks:
  on_startup:
    preload:
      - "fast"
